<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="920" fill="#171A22"/>
  <rect x="42" y="42" width="1516" height="836" rx="18" fill="#EFE7D6" stroke="#000000" stroke-width="8"/>
  <text x="98" y="126" fill="#000000" font-family="Arial, sans-serif" font-size="46" font-weight="700">Analog Validation</text>
  <text x="99" y="168" fill="#000000" font-family="Arial, sans-serif" font-size="24">Shared cold-exposure tradeoff pattern, not telescope-specific proof</text>

  <rect x="92" y="228" width="430" height="410" rx="18" fill="#FFD23C" stroke="#000000" stroke-width="8"/>
  <text x="130" y="286" fill="#000000" font-family="Arial, sans-serif" font-size="34" font-weight="700">Astronomy User</text>
  <text x="130" y="336" fill="#000000" font-family="Arial, sans-serif" font-size="24">
    <tspan x="130" dy="0">Long cold exposure outdoors</tspan>
    <tspan x="130" dy="34">Intermittent fine manipulation</tspan>
    <tspan x="130" dy="34">Need to focus, swap eyepieces,</tspan>
    <tspan x="130" dy="34">tighten parts, and re-center</tspan>
    <tspan x="130" dy="34">Warmth and dexterity compete</tspan>
    <tspan x="130" dy="34">in the same workflow</tspan>
  </text>

  <rect x="1078" y="228" width="430" height="410" rx="18" fill="#31D7C4" stroke="#000000" stroke-width="8"/>
  <text x="1116" y="286" fill="#000000" font-family="Arial, sans-serif" font-size="34" font-weight="700">Delivery Rider</text>
  <text x="1116" y="336" fill="#000000" font-family="Arial, sans-serif" font-size="24">
    <tspan x="1116" dy="0">Long cold exposure in motion</tspan>
    <tspan x="1116" dy="34">Hands need protection by default</tspan>
    <tspan x="1116" dy="34">Intermittent manipulation still matters</tspan>
    <tspan x="1116" dy="34">Existing handlebar muffs show</tspan>
    <tspan x="1116" dy="34">that high warmth and quick access</tspan>
    <tspan x="1116" dy="34">can be separated by mode</tspan>
  </text>

  <rect x="562" y="300" width="476" height="270" rx="18" fill="#171A22" stroke="#000000" stroke-width="8"/>
  <text x="602" y="356" fill="#F8F3E8" font-family="Arial, sans-serif" font-size="34" font-weight="700">Shared Design Principle</text>
  <text x="602" y="410" fill="#F8F3E8" font-family="Arial, sans-serif" font-size="24">
    <tspan x="602" dy="0">High protection and high dexterity</tspan>
    <tspan x="602" dy="34">do not need to exist in the same</tspan>
    <tspan x="602" dy="34">state at the same time.</tspan>
    <tspan x="602" dy="40">This supports modal logic.</tspan>
  </text>

  <path d="M522 432H562" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
  <path d="M1038 432H1078" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
  <path d="M930 706H670" stroke="#000000" stroke-width="8" stroke-linecap="round"/>

  <rect x="438" y="700" width="726" height="110" rx="14" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <text x="474" y="752" fill="#000000" font-family="Arial, sans-serif" font-size="24">
    <tspan x="474" dy="0">Boundary: rider evidence reinforces the modal tradeoff,</tspan>
    <tspan x="474" dy="32">but it does not replace astronomy-specific validation of telescope tasks.</tspan>
  </text>
</svg>
