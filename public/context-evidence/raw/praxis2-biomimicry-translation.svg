<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <rect width="1600" height="900" fill="#171A22"/>
  <rect x="60" y="60" width="1480" height="780" rx="30" fill="#EFE7D6" stroke="#000" stroke-width="8"/>
  <text x="110" y="150" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">Biological Strategy -> Functional Principle -> Design Translation</text>
  <text x="110" y="195" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="20">Praxis II biomimicry was strongest when the analogy was converted into a testable thermal logic.</text>

  <rect x="110" y="250" width="400" height="500" rx="24" fill="#FFF5D6" stroke="#000" stroke-width="6"/>
  <rect x="560" y="250" width="480" height="500" rx="24" fill="#D9FFF8" stroke="#000" stroke-width="6"/>
  <rect x="1090" y="250" width="400" height="500" rx="24" fill="#FFE0B3" stroke="#000" stroke-width="6"/>

  <text x="150" y="315" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Biological Reference</text>
  <text x="600" y="315" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Functional Principle</text>
  <text x="1130" y="315" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Design Translation</text>

  <text x="150" y="390" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Polar bear fur</text>
  <text x="150" y="430" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="21">Warmth comes from structure,</text>
  <text x="150" y="460" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="21">trapped air, and efficiency</text>

  <text x="150" y="560" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Penguin huddle / igloo logic</text>
  <text x="150" y="600" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="21">Protection can come from</text>
  <text x="150" y="630" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="21">creating a local microclimate</text>

  <text x="600" y="390" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Selective insulation</text>
  <text x="600" y="430" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="21">Do not heat or insulate every</text>
  <text x="600" y="460" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="21">surface equally if function is local</text>

  <text x="600" y="560" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Buffered warm zone</text>
  <text x="600" y="600" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="21">Maintain warmth by default, then</text>
  <text x="600" y="630" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="21">recover dexterity when needed</text>

  <text x="1130" y="390" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Thermal zoning</text>
  <text x="1130" y="430" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="21">Fingertips, knuckles, and wrist</text>
  <text x="1130" y="460" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="21">treated as different heating regions</text>

  <text x="1130" y="560" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Protected warm-state logic</text>
  <text x="1130" y="600" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="21">A glove can preserve warmth</text>
  <text x="1130" y="630" fill="#333" font-family="Arial, Helvetica, sans-serif" font-size="21">without staying in one fixed state</text>

  <path d="M510 410H560" stroke="#000" stroke-width="6"/>
  <path d="M1040 410H1090" stroke="#000" stroke-width="6"/>
  <path d="M510 580H560" stroke="#000" stroke-width="6"/>
  <path d="M1040 580H1090" stroke="#000" stroke-width="6"/>
  <polygon points="550,410 525,395 525,425" fill="#000"/>
  <polygon points="1080,410 1055,395 1055,425" fill="#000"/>
  <polygon points="550,580 525,565 525,595" fill="#000"/>
  <polygon points="1080,580 1055,565 1055,595" fill="#000"/>
</svg>
